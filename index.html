<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Robot Fault Search</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

    <div class="header">

        <img src="580b57fcd9996e24bc43c4a3.png" class="logo" alt="Toyota Logo">

        <div>

            <h1>Toyota Paint Robot Fault Search</h1>

            <p class="subtitle">
                Maintenance Support System
            </p>

        </div>

    </div>

    <hr>

    <p>
        Enter the robot error code shown on the Teach Pendant.
    </p>

    <input
        type="text"
        id="searchBox"
        placeholder="Example: D1032">

    <button onclick="searchFault()">
        Search
    </button>

    <div id="result"></div>

</div>

    <script src="script.js"></script>

</body>

</html>
